name: Delete Branch on Jira Done

on:
  repository_dispatch:
    types: [jira-done]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Delete branch
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB }}
          BRANCH_NAME: ${{ github.event.client_payload.branch }}
        run: |
          echo "Deleting branch: $BRANCH_NAME"
          git fetch origin
          git push https://${GITHUB_TOKEN}@github.com/abdallahjbarah/Jira-test.git --delete $BRANCH_NAME || echo "Branch does not exist"
