name: Delete Branch on Jira Done

on:
  repository_dispatch:
    types: [jira-done]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository so git commands work
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Delete the branch dynamically using PAT
      - name: Delete Jira-created branch
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}        # Your GitHub PAT secret
          BRANCH_NAME: ${{ github.event.client_payload.branch }}
        run: |
          echo "Deleting branch: $BRANCH_NAME"
          # Fetch all branches using PAT
          git fetch https://${PAT_GITHUB}@github.com/abdallahjbarah/Jira-test.git
          # Delete the branch using PAT
          git push https://${PAT_GITHUB}@github.com/abdallahjbarah/Jira-test.git --delete $BRANCH_NAME || echo "Branch does not exist"