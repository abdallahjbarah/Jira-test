name: Delete Branch on Jira Done

on:
  repository_dispatch:
    types: [jira-done]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # fetch all branches

      # Step 2: Replace origin with PAT-authenticated remote
      - name: Configure PAT remote
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
        run: |
          # Remove default origin (github-actions bot)
          git remote remove origin
          # Add PAT-authenticated origin
          git remote add origin https://${PAT_GITHUB}@github.com/abdallahjbarah/Jira-test.git
          git fetch origin --prune

      # Step 3: Delete Jira-created branch
      - name: Delete Jira-created branch
        env:
          BRANCH_NAME: ${{ github.event.client_payload.branch }}
        run: |
          echo "Deleting branch: $BRANCH_NAME"
          git push origin --delete $BRANCH_NAME || echo "Branch does not exist"
